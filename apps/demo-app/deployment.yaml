apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: diplom
    backstage.io/kubernetes-id: diplom
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        app.kubernetes.io/name: demo-app
        app.kubernetes.io/part-of: diplom
        backstage.io/kubernetes-id: diplom
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: default
  labels:
    app: demo-app
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: diplom
    backstage.io/kubernetes-id: diplom
spec:
  selector:
    app: demo-app
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  namespace: default
  labels:
    app: demo-app
    app.kubernetes.io/part-of: diplom
data:
  index.html: |
    <html>
      <body>
        <h1>Demo App for Backstage</h1>
        <p>This is a test application</p>
      </body>
    </html>